<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排版工具 - 文章格式化</title>
    
    <!-- 防闪烁主题预加载 - 立即应用深色模式样式 -->
    <script>
        (function() {
            // 立即检查localStorage并应用深色模式
            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            if (isDarkMode) {
                document.documentElement.classList.add('dark-mode');
                // 立即添加内联样式，确保在CSS加载前就有正确的背景色
                document.documentElement.style.backgroundColor = '#1a1a1a';
                document.documentElement.style.color = '#ffffff';
            }
        })();
    </script>
    
    <!-- 内联关键CSS - 防止FOUC (Flash of Unstyled Content) -->
    <style>
        /* 立即应用的基础样式，防止闪烁 */
        html {
            background-color: #f5f5f5;
            color: #262626;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        html.dark-mode {
            background-color: #1a1a1a !important;
            color: #ffffff !important;
        }
        
        body {
            background-color: inherit;
            color: inherit;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* 顶部横栏防闪烁样式 */
        .page-header {
            background: linear-gradient(135deg, #002bc0, #0056ff) !important;
            transition: background 0.3s ease;
        }
        
        html.dark-mode .page-header {
            background: linear-gradient(135deg, #333, #555) !important;
        }
    </style>
    
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="/static/js/global-theme.js"></script>
    <style>
        :root {
            --primary-color: #002bc0;
            --success-color: #52c41a;
            --warning-color: #faad14;
            --danger-color: #ff4d4f;
            --info-color: #1677ff;
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --input-bg: #ffffff;
            --preview-bg: #fafafa;
            --text-primary: #262626;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #eaeaea;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            
            /* 主题切换过渡时间 */
            --theme-transition: all 0.3s ease;
        }

        /* 深色模式CSS变量 */
        .dark-mode {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --input-bg: #1e1e1e;
            --preview-bg: #252525;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --text-muted: #999999;
            --border-color: #404040;
            --primary-color: #4a9eff;
            --success-color: #52c41a;
            --warning-color: #faad14;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            transition: var(--theme-transition);
        }

        .app-container {
            max-width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            background: linear-gradient(135deg, var(--primary-color), #0056ff);
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .back-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }

        .back-button:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .page-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            width: 40px; /* 占位，保持标题居中 */
        }

        .theme-toggle-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .theme-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .main-content {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            width: 100%;
        }

        .tool-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            height: calc(100vh - 120px);
        }

        .input-section, .output-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transition: var(--theme-transition);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .section-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-tool {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--theme-transition);
        }

        .btn-tool:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .btn-tool.primary {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .btn-tool.success {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
            transition: var(--theme-transition);
        }

        .btn-tool.success:hover {
            background: #389e0d;
            border-color: #389e0d;
        }

        .btn-tool.warning {
            background: var(--warning-color);
            color: white;
            border-color: var(--warning-color);
            transition: var(--theme-transition);
        }

        .btn-tool.warning:hover {
            background: #d48806;
            border-color: #d48806;
        }

        /* 深色模式下的按钮样式 */
        .dark-mode .btn-tool.success {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .dark-mode .btn-tool.success:hover {
            background: #73d13d;
            border-color: #73d13d;
        }

        .dark-mode .btn-tool.warning {
            background: var(--warning-color);
            color: white;
            border-color: var(--warning-color);
        }

        .dark-mode .btn-tool.warning:hover {
            background: #ffc53d;
            border-color: #ffc53d;
        }

        .text-area {
            flex: 1;
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            font-size: 0.9rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            font-family: 'Courier New', monospace;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: var(--theme-transition);
        }

        .text-area:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 43, 192, 0.1);
        }

        .preview-area {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            background: var(--preview-bg);
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-primary);
            transition: var(--theme-transition);
        }



        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            font-size: 0.875rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            margin-top: 1rem;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-content {
                padding: 0.25rem;
            }

            .tool-container {
                grid-template-columns: 1fr;
                height: auto;
                gap: 0.25rem;
            }

            .input-section, .output-section {
                padding: 0.5rem;
            }

            .section-header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
                margin-bottom: 0.5rem;
            }

            .section-title {
                text-align: center;
                font-size: 0.9rem;
                margin: 0;
            }

            .section-actions {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
                gap: 0.25rem;
                width: 100%;
            }

            .btn-tool {
                padding: 0.4rem 0.2rem;
                font-size: 0.65rem;
                text-align: center;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                line-height: 1.2;
                min-width: 80px;
            }

            .btn-tool i {
                display: inline-block;
                margin-right: 0.2rem;
                margin-bottom: 0;
                font-size: 0.7rem;
            }

            .text-area {
                min-height: 150px;
                font-size: 0.8rem;
                padding: 0.5rem;
            }

            .preview-area {
                min-height: 150px;
                font-size: 0.8rem;
                padding: 0.5rem;
            }

            .status-bar {
                flex-direction: column;
                gap: 0.15rem;
                font-size: 0.7rem;
                text-align: center;
                padding: 0.25rem 0;
                margin-top: 0.5rem;
            }

            .page-title {
                font-size: 1rem;
            }

            .header-content {
                padding: 0 0.25rem;
            }

            .page-header {
                padding: 0.5rem 0;
            }
        }

        /* 更小屏幕的优化 */
        @media (max-width: 480px) {
            .section-actions {
                grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
                gap: 0.2rem;
            }

            .btn-tool {
                padding: 0.3rem 0.15rem;
                font-size: 0.6rem;
                min-width: 70px;
            }

            .btn-tool i {
                display: inline-block;
                margin-right: 0.15rem;
                margin-bottom: 0;
                font-size: 0.65rem;
            }

            .text-area, .preview-area {
                min-height: 120px;
                font-size: 0.75rem;
                padding: 0.4rem;
            }

            .section-title {
                font-size: 0.85rem;
            }

            .status-bar {
                font-size: 0.65rem;
            }
        }

        /* 预览样式 */
        .preview-area h1, .preview-area h2, .preview-area h3 {
            margin: 1rem 0 0.5rem 0;
            color: var(--text-primary);
        }

        .preview-area p {
            margin: 0.5rem 0;
            text-indent: 2em;
        }

        .preview-area ul {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }

        .preview-area li {
            margin: 0.25rem 0;
            line-height: 1.6;
        }

        .preview-area blockquote {
            border-left: 4px solid var(--primary-color);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .preview-area code {
            background: #f0f0f0;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #333;
        }

        .preview-area pre {
            background: #f8f8f8;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
            color: #333;
        }

        /* 深色模式下的预览区域样式 */
        .dark-mode .preview-area code {
            background: #3a3a3a;
            color: #e6e6e6;
        }

        .dark-mode .preview-area pre {
            background: #2a2a2a;
            color: #e6e6e6;
        }

        /* 还原HTML功能的专用样式 - 移除可能导致页面缩小的样式 */
        .restored-content-wrapper {
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .restored-content-wrapper p {
            margin: 0;
            padding: 0;
        }

        .restored-content-wrapper h1, 
        .restored-content-wrapper h2, 
        .restored-content-wrapper h3 {
            font-size: 17px;
            margin: 0.5em 0;
        }

        .restored-content-wrapper ul, 
        .restored-content-wrapper ol {
            margin: 0;
            padding-left: 1.5em;
        }

        .restored-content-wrapper li {
            margin: 0;
        }

        .restored-content-wrapper img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 页面头部 -->
        <header class="page-header">
            <div class="header-content">
                <button class="back-button" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h1 class="page-title">排版工具</h1>
                <div class="header-actions">
                    <button id="theme-toggle" class="theme-toggle-btn" onclick="toggleTheme()" title="切换深色模式">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 主要内容 -->
        <main class="main-content">
            <!-- 编辑和预览区域 -->
            <div class="tool-container">
                <!-- 输入区域 -->
                <div class="input-section">
                    <div class="section-header">
                        <h3 class="section-title">原文</h3>
                        <div class="section-actions">
                            <button class="btn-tool" onclick="clearInput()">
                                <i class="fas fa-trash"></i> 清空
                            </button>
                            <button class="btn-tool" onclick="pasteFromClipboard()">
                                <i class="fas fa-paste"></i> 粘贴
                            </button>
                            <label class="btn-tool" for="fileInput" style="margin: 0; cursor: pointer;">
                                <i class="fas fa-upload"></i> 上传
                                <input type="file" id="fileInput" accept=".txt,.md,.html,.htm" onchange="handleFileUpload(event)" style="display: none;">
                            </label>
                            <button class="btn-tool warning" onclick="restoreHtml()">
                                <i class="fas fa-magic"></i> 还原HTML
                            </button>
                            <button class="btn-tool success" onclick="renderMarkdown()">
                                <i class="fab fa-markdown"></i> 还原Markdown
                            </button>
                        </div>
                    </div>
                    <textarea 
                        class="text-area" 
                        id="inputText" 
                        placeholder="请输入或粘贴需要排版的文本内容..."
                    ></textarea>
                    <div class="status-bar">
                        <span id="inputStats">字符数: 0 | 段落数: 0</span>
                    </div>
                </div>

                <!-- 输出区域 -->
                <div class="output-section">
                    <div class="section-header">
                        <h3 class="section-title">预览</h3>
                        <div class="section-actions">
                            <button class="btn-tool" onclick="copyFormattedText()">
                                <i class="fas fa-copy"></i> 复制文本
                            </button>
                            <button class="btn-tool" onclick="copyFormattedHtml()">
                                <i class="fas fa-code"></i> 复制预览
                            </button>
                        </div>
                    </div>
                    <div class="preview-area" id="previewArea">
                        <p style="color: var(--text-muted); text-align: center; margin-top: 2rem;">
                            <i class="fas fa-edit" style="font-size: 2rem; margin-bottom: 1rem; display: block;"></i>
                            在左侧输入文本，这里将显示格式化后的预览效果
                        </p>
                    </div>
                    <div class="status-bar">
                        <span id="outputStats">处理后字符数: 0</span>
                        <span id="processingTime">处理时间: 0ms</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        /**
         * 页面初始化
         */
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化全局主题管理器
            if (window.globalThemeManager) {
                window.globalThemeManager.init();
            }
            
            // 设置示例文本
            const exampleText = `这是一个排版工具的示例文本。

它可以帮助您：
1. 自动调整段落格式
2. 转换标点符号
3. 清理多余空格
4. 添加首行缩进

支持多种文件格式导入，包括 .txt、.html 和 .md 文件。`;
            
            document.getElementById('inputText').value = exampleText;
            updatePreview();
            
            // 添加输入框事件监听器
            const inputText = document.getElementById('inputText');
            inputText.addEventListener('input', updatePreview);
            inputText.addEventListener('paste', function() {
                // 延迟执行以确保粘贴内容已经插入
                setTimeout(updatePreview, 10);
            });
            
            // 初始化主题图标
            const isDark = window.globalThemeManager ? window.globalThemeManager.isDarkModeEnabled() : false;
            updateThemeIcon(isDark);
        });

        /**
         * 主题切换功能
         */
        function toggleTheme() {
            const isDark = window.globalThemeManager.isDarkModeEnabled();
            window.globalThemeManager.toggleDarkMode(!isDark);
            updateThemeIcon(!isDark);
        }
        
        function updateThemeIcon(isDark) {
            const themeToggle = document.getElementById('theme-toggle');
            const icon = themeToggle.querySelector('i');
            if (isDark) {
                icon.className = 'fas fa-sun';
                themeToggle.title = '切换浅色模式';
            } else {
                icon.className = 'fas fa-moon';
                themeToggle.title = '切换深色模式';
            }
        }

        /**
         * 返回上一页
         */
        function goBack() {
            window.history.back();
        }

        /**
         * 处理文件上传
         */
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                let text = '';
                const fileName = file.name.toLowerCase();
                
                if (fileName.endsWith('.txt') || fileName.endsWith('.md')) {
                    text = await file.text();
                } else if (fileName.endsWith('.html') || fileName.endsWith('.htm')) {
                    // 处理HTML文件 - 保留HTML结构而不是转换为纯文本
                    const htmlContent = await file.text();
                    // 清理HTML内容，移除DOCTYPE、html、head、body等标签，保留内容部分
                    text = cleanHtmlForImport(htmlContent);
                }  
                document.getElementById('inputText').value = text;
                updatePreview();
                showToast('文件上传成功', 'success');
            } catch (error) {
                console.error('文件上传失败:', error);
                showToast('文件上传失败，请重试', 'error');
            }
        }

        /**
         * 清理HTML内容用于导入
         */
        function cleanHtmlForImport(htmlContent) {
            // 移除DOCTYPE声明
            let cleanedHtml = htmlContent.replace(/<!DOCTYPE[^>]*>/i, '');
            
            // 创建临时DOM来解析HTML
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = cleanedHtml;
            
            // 移除html、head、body等外层标签，只保留内容
            let bodyContent = tempDiv.querySelector('body');
            if (bodyContent) {
                return bodyContent.innerHTML;
            }
            
            // 如果没有body标签，尝试移除html标签
            let htmlElement = tempDiv.querySelector('html');
            if (htmlElement) {
                return htmlElement.innerHTML;
            }
            
            // 如果都没有，返回清理后的内容
            return tempDiv.innerHTML;
        }

        /**
         * 从HTML内容中提取文本
         */
        function extractTextFromHtml(htmlContent) {
            // 创建一个临时的DOM元素来解析HTML
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlContent;
            
            // 移除script和style标签
            const scripts = tempDiv.querySelectorAll('script, style');
            scripts.forEach(el => el.remove());
            
            // 处理标题标签，转换为Markdown格式
            const headings = tempDiv.querySelectorAll('h1, h2, h3, h4, h5, h6');
            headings.forEach(heading => {
                const level = parseInt(heading.tagName.charAt(1));
                const prefix = '#'.repeat(level) + ' ';
                heading.textContent = prefix + heading.textContent;
            });
            
            // 处理列表项
            const listItems = tempDiv.querySelectorAll('li');
            listItems.forEach(li => {
                li.textContent = '- ' + li.textContent;
            });
            
            // 处理段落，添加换行
            const paragraphs = tempDiv.querySelectorAll('p');
            paragraphs.forEach(p => {
                p.textContent = p.textContent + '\n';
            });
            
            // 获取纯文本内容
            let text = tempDiv.textContent || tempDiv.innerText || '';
            
            // 清理多余的空行
            text = text.replace(/\n\s*\n\s*\n/g, '\n\n').trim();
            
            return text;
        }

        /**
         * 更新预览
         */
        function updatePreview() {
            const startTime = performance.now();
            const inputText = document.getElementById('inputText').value;
            
            if (!inputText.trim()) {
                document.getElementById('previewArea').innerHTML = `
                    <p style="color: var(--text-muted); text-align: center; margin-top: 2rem;">
                        <i class="fas fa-edit" style="font-size: 2rem; margin-bottom: 1rem; display: block;"></i>
                        在左侧输入文本，这里将显示格式化后的预览效果
                    </p>
                `;
                updateStats('', 0);
                return;
            }

            let processedText = inputText;

            // 应用默认格式化选项
            processedText = removeExtraSpaces(processedText);
            processedText = convertPunctuation(processedText);

            // 检查是否是HTML内容
            if (processedText.includes('<') && processedText.includes('>')) {
                // 如果是HTML内容，直接显示，不进行额外处理
                document.getElementById('previewArea').innerHTML = processedText;
                // 显示提示，建议用户使用"还原HTML"功能
                showToast('检测到HTML内容，建议点击"还原HTML"按钮获得最佳排版效果', 'info');
            } else {
                // 如果是纯文本，转换为HTML
                const htmlContent = convertToHtml(processedText);
                document.getElementById('previewArea').innerHTML = htmlContent;
                // 应用样式
                applyPreviewStyles();
            }

            const endTime = performance.now();
            updateStats(processedText, endTime - startTime);
        }

        /**
         * 应用预览样式
         */
        function applyPreviewStyles() {
            const previewArea = document.getElementById('previewArea');
            // 使用默认样式值
            const fontSize = '16px';
            const paragraphSpacing = 1;
            const autoIndent = true;

            previewArea.style.fontSize = fontSize;
            
            const paragraphs = previewArea.querySelectorAll('p');
            paragraphs.forEach(p => {
                p.style.marginBottom = `${paragraphSpacing}em`;
                if (autoIndent) {
                    p.style.textIndent = '2em';
                } else {
                    p.style.textIndent = '0';
                }
            });
        }

        /**
         * 清理多余空格
         */
        function removeExtraSpaces(text) {
            return text
                .replace(/[ \t]+/g, ' ')  // 多个空格/制表符替换为单个空格
                .replace(/\n\s*\n/g, '\n\n')  // 多个换行替换为双换行
                .replace(/^\s+|\s+$/g, '');  // 去除首尾空白
        }

        /**
         * 转换标点符号
         */
        function convertPunctuation(text) {
            const punctuationMap = {
                ',': '，',
                '.': '。',
                '?': '？',
                '!': '！',
                ':': '：',
                ';': '；',
                '(': '（',
                ')': '）',
                '[': '【',
                ']': '】',
                '{': '｛',
                '}': '｝'
            };
            
            let quoteCount = 0;
            
            return text.replace(/[,.?!:;()\[\]{}]|"|'/g, match => {
                if (match === '"' || match === "'") {
                    quoteCount++;
                    return quoteCount % 2 === 1 ? '"' : '"';
                }
                return punctuationMap[match] || match;
            });
        }

        /**
         * 转换为HTML
         */
        function convertToHtml(text) {
            if (!text) return '';
            
            const convertedText = convertPunctuation(text);
            const html = convertedText.replace(/\n/g, '<br>')
                             .replace(/\*/g, '')
                             .replace(/#([^#\n]+)/g, '<span style="color: #000; font-weight: bold;">#$1</span>')
                             .replace(/🌙|✨|😍|🎉|💖|👍|🛒/g, match => `<span style="font-size: 1.2em;">${match}</span>`);
            
            return html;
        }

        /**
         * 渲染HTML并应用高级排版样式
         */
        function renderHtml() {
            const text = document.getElementById('inputText').value;
            
            // 处理段落后的<br/>标签
            const processedText = text.replace(/<\/p>\s*<br\s*\/?>/g, '</p><p style="margin-bottom:0px;"><br/></p>')
                .replace(/<\/ul>\s*<br\s*\/?>/g, '</ul><p style="margin-bottom:0px;"><br/></p>');
            
            const preview = document.getElementById('previewArea');
            if (processedText !== text) {
                preview.innerHTML = processedText;
            }
            
            preview.style.fontSize = '17px';
            preview.style.lineHeight = '1.5';
            
            const elements = preview.getElementsByTagName('*');
            for (let i = 0; i < elements.length; i++) {
                const element = elements[i];
                
                // 处理代码块的缩进
                if (element.className === 'highlight') {
                    const codeContainer = element.querySelector('div[style*="color: #d4d4d4"]');
                    if (codeContainer) {
                        const codeLines = codeContainer.children;
                        Array.from(codeLines).forEach(line => {
                            const text = line.textContent;
                            const leadingSpaces = text.match(/^[ \t]*/)[0].length;
                            if (leadingSpaces > 0) {
                                line.innerHTML = '&nbsp;'.repeat(leadingSpaces) + text.slice(leadingSpaces);
                            }
                        });
                    }
                }
                
                const computedStyle = window.getComputedStyle(element);
                
                if (computedStyle.fontSize === preview.style.fontSize) {
                    element.style.fontSize = '17px';
                }
                
                if (element.tagName.toLowerCase() === 'p') {
                    if (!element.style.marginBottom) {
                        element.style.margin = '0';
                        element.style.padding = '0';
                    }
                }
                
                element.style.boxSizing = 'border-box';
            }

            // 处理特殊的样式属性
            const sections = preview.querySelectorAll('section');
            sections.forEach(section => {
                if (section.style.display === 'inline-block') {
                    // section.style.display = 'block';
                }
            });
        }

        /**
         * 更新统计信息
         */
        function updateStats(processedText, processingTime) {
            const inputText = document.getElementById('inputText').value;
            const inputChars = inputText.length;
            const inputParagraphs = inputText.split('\n\n').filter(p => p.trim()).length;
            const outputChars = processedText.length;

            document.getElementById('inputStats').textContent = 
                `字符数: ${inputChars} | 段落数: ${inputParagraphs}`;
            document.getElementById('outputStats').textContent = 
                `处理后字符数: ${outputChars}`;
            document.getElementById('processingTime').textContent = 
                `处理时间: ${Math.round(processingTime)}ms`;
        }

        /**
         * 清空输入
         */
        function clearInput() {
            if (confirm('确定要清空所有内容吗？')) {
                document.getElementById('inputText').value = '';
                updatePreview();
            }
        }

        /**
         * 从剪贴板粘贴
         */
        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('inputText').value = text;
                updatePreview();
                showToast('粘贴成功', 'success');
            } catch (error) {
                console.error('粘贴失败:', error);
                showToast('粘贴失败，请手动粘贴', 'error');
            }
        }

        /**
         * 复制格式化文本
         */
        async function copyFormattedText() {
            const previewArea = document.getElementById('previewArea');
            const text = previewArea.innerText || previewArea.textContent;
            
            try {
                // 优先使用现代的 Clipboard API
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                    showToast('文本已复制到剪贴板', 'success');
                } else {
                    // 降级方案：使用传统的选择和复制方法
                    await fallbackCopyText(text);
                    showToast('文本已复制到剪贴板', 'success');
                }
            } catch (error) {
                console.error('复制失败:', error);
                // 最后的降级方案：显示文本供用户手动复制
                showCopyModal(text, '复制文本');
            }
        }

        /**
         * 复制格式化HTML
         */
        async function copyFormattedHtml() {
            const previewArea = document.getElementById('previewArea');
            const html = previewArea.innerHTML;
            
            try {
                // 优先使用现代的 Clipboard API
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(html);
                    showToast('HTML代码已复制到剪贴板', 'success');
                } else {
                    // 降级方案：使用传统的选择和复制方法
                    await fallbackCopyText(html);
                    showToast('HTML代码已复制到剪贴板', 'success');
                }
            } catch (error) {
                console.error('复制失败:', error);
                // 最后的降级方案：显示HTML代码供用户手动复制
                showCopyModal(html, '复制HTML代码');
            }
        }

        /**
         * 还原HTML - 完全按照参照文件的逻辑处理HTML内容
         */
        function restoreHtml() {
            const inputText = document.getElementById('inputText').value.trim();
            
            if (!inputText) {
                showToast('没有内容需要还原', 'warning');
                return;
            }
            
            try {
                let text = inputText;
                
                // 处理段落后的<br/>标签
                const processedText = text.replace(/<\/p>\s*<br\s*\/?>/g, '</p><p style="margin-bottom:0px;"><br/></p>')
                    .replace(/<\/ul>\s*<br\s*\/?>/g, '</ul><p style="margin-bottom:0px;"><br/></p>');
                
                const preview = document.getElementById('previewArea');
                
                // 直接设置HTML内容，不使用包装容器
                preview.innerHTML = processedText;
                
                // 设置预览区域的基础样式
                preview.style.fontSize = '17px';
                preview.style.lineHeight = '1.5';
                
                const elements = preview.getElementsByTagName('*');
                for (let i = 0; i < elements.length; i++) {
                    const element = elements[i];
                    
                    // 处理代码块的缩进
                    if (element.className === 'highlight') {
                        const codeContainer = element.querySelector('div[style*="color: #d4d4d4"]');
                        if (codeContainer) {
                            const codeLines = codeContainer.children;
                            Array.from(codeLines).forEach(line => {
                                const text = line.textContent;
                                const leadingSpaces = text.match(/^[ \t]*/)[0].length;
                                if (leadingSpaces > 0) {
                                    line.innerHTML = '&nbsp;'.repeat(leadingSpaces) + text.slice(leadingSpaces);
                                }
                            });
                        }
                    }
                    
                    const computedStyle = window.getComputedStyle(element);
                    
                    if (computedStyle.fontSize === preview.style.fontSize) {
                        element.style.fontSize = '17px';
                    }
                    
                    if (element.tagName.toLowerCase() === 'p') {
                        if (!element.style.marginBottom) {
                            element.style.margin = '0';
                            element.style.padding = '0';
                        }
                    }
                    
                    element.style.boxSizing = 'border-box';
                }

                // 处理特殊的样式属性
                const sections = preview.querySelectorAll('section');
                sections.forEach(section => {
                    if (section.style.display === 'inline-block') {
                        // section.style.display = 'block';
                    }
                });
                
                showToast('HTML内容已还原', 'success');
            } catch (error) {
                console.error('HTML还原失败:', error);
                showToast('HTML还原失败，请重试', 'error');
            }
        }

        /**
         * 将Markdown文本渲染为HTML
         */
        function renderMarkdown() {
            const inputText = document.getElementById('inputText').value.trim();
            
            if (!inputText) {
                showToast('没有内容需要渲染', 'warning');
                return;
            }
            
            try {
                // 使用marked.js将Markdown转换为HTML
                const htmlContent = marked.parse(inputText);
                
                const preview = document.getElementById('previewArea');
                
                // 设置转换后的HTML内容
                preview.innerHTML = htmlContent;
                
                // 设置预览区域的基础样式
                preview.style.fontSize = '17px';
                preview.style.lineHeight = '1.5';
                
                // 应用样式到所有元素
                const elements = preview.getElementsByTagName('*');
                for (let i = 0; i < elements.length; i++) {
                    const element = elements[i];
                    
                    // 设置段落样式
                    if (element.tagName.toLowerCase() === 'p') {
                        element.style.margin = '0 0 1em 0';
                        element.style.padding = '0';
                    }
                    
                    // 设置标题样式
                    if (['h1', 'h2', 'h3', 'h4', 'h5', 'h6'].includes(element.tagName.toLowerCase())) {
                        element.style.margin = '1.5em 0 0.5em 0';
                        element.style.fontWeight = 'bold';
                    }
                    
                    // 设置列表样式
                    if (['ul', 'ol'].includes(element.tagName.toLowerCase())) {
                        element.style.margin = '0.5em 0';
                        element.style.paddingLeft = '2em';
                    }
                    
                    // 设置代码块样式
                    if (element.tagName.toLowerCase() === 'pre') {
                        element.style.background = '#f5f5f5';
                        element.style.padding = '1em';
                        element.style.borderRadius = '4px';
                        element.style.overflow = 'auto';
                        element.style.margin = '1em 0';
                    }
                    
                    // 设置行内代码样式
                    if (element.tagName.toLowerCase() === 'code' && element.parentElement.tagName.toLowerCase() !== 'pre') {
                        element.style.background = '#f5f5f5';
                        element.style.padding = '0.2em 0.4em';
                        element.style.borderRadius = '3px';
                        element.style.fontSize = '0.9em';
                    }
                    
                    // 设置引用样式
                    if (element.tagName.toLowerCase() === 'blockquote') {
                        element.style.borderLeft = '4px solid #ddd';
                        element.style.paddingLeft = '1em';
                        element.style.margin = '1em 0';
                        element.style.color = '#666';
                    }
                    
                    // 设置表格样式
                    if (element.tagName.toLowerCase() === 'table') {
                        element.style.borderCollapse = 'collapse';
                        element.style.width = '100%';
                        element.style.margin = '1em 0';
                    }
                    
                    if (['th', 'td'].includes(element.tagName.toLowerCase())) {
                        element.style.border = '1px solid #ddd';
                        element.style.padding = '0.5em';
                        element.style.textAlign = 'left';
                    }
                    
                    if (element.tagName.toLowerCase() === 'th') {
                        element.style.background = '#f5f5f5';
                        element.style.fontWeight = 'bold';
                    }
                    
                    element.style.boxSizing = 'border-box';
                }
                
                showToast('Markdown内容已渲染为HTML', 'success');
            } catch (error) {
                console.error('Markdown渲染失败:', error);
                showToast('Markdown渲染失败，请重试', 'error');
            }
        }

        /**
         * 降级复制方案（适用于不支持Clipboard API的浏览器）
         */
        function fallbackCopyText(text) {
            return new Promise((resolve, reject) => {
                try {
                    // 创建临时的textarea元素
                    const textArea = document.createElement('textarea');
                    textArea.value = text;
                    textArea.style.position = 'fixed';
                    textArea.style.left = '-999999px';
                    textArea.style.top = '-999999px';
                    document.body.appendChild(textArea);
                    
                    // 选择文本
                    textArea.focus();
                    textArea.select();
                    
                    // 尝试复制
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    
                    if (successful) {
                        resolve();
                    } else {
                        reject(new Error('execCommand failed'));
                    }
                } catch (error) {
                    reject(error);
                }
            });
        }

        /**
         * 显示复制模态框（最后的降级方案）
         */
        function showCopyModal(content, title) {
            // 创建模态框
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10000;
                padding: 20px;
                box-sizing: border-box;
            `;
            
            const modalContent = document.createElement('div');
            modalContent.style.cssText = `
                background: var(--card-bg);
                border-radius: 12px;
                padding: 20px;
                max-width: 90%;
                max-height: 80%;
                overflow: auto;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            `;
            
            modalContent.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="margin: 0; color: var(--text-primary);">${title}</h3>
                    <button onclick="this.closest('.copy-modal').remove()" style="
                        background: none;
                        border: none;
                        font-size: 20px;
                        cursor: pointer;
                        color: var(--text-secondary);
                        padding: 5px;
                    ">&times;</button>
                </div>
                <p style="color: var(--text-secondary); margin-bottom: 15px;">
                    自动复制失败，请手动选择并复制以下内容：
                </p>
                <textarea readonly style="
                    width: 100%;
                    height: 200px;
                    border: 1px solid var(--border-color);
                    border-radius: 6px;
                    padding: 10px;
                    font-family: monospace;
                    font-size: 12px;
                    resize: vertical;
                    background: var(--bg-color);
                    color: var(--text-primary);
                ">${content}</textarea>
                <div style="margin-top: 15px; text-align: right;">
                    <button onclick="this.closest('.copy-modal').remove()" style="
                        background: var(--primary-color);
                        color: white;
                        border: none;
                        padding: 8px 16px;
                        border-radius: 6px;
                        cursor: pointer;
                    ">关闭</button>
                </div>
            `;
            
            modal.className = 'copy-modal';
            modal.appendChild(modalContent);
            document.body.appendChild(modal);
            
            // 自动选择文本
            const textarea = modalContent.querySelector('textarea');
            setTimeout(() => {
                textarea.select();
                textarea.setSelectionRange(0, 99999); // 移动端兼容
            }, 100);
            
            // 点击背景关闭
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }

        /**
         * 显示提示消息
         */
        function showToast(message, type = 'info') {
            // 创建提示元素
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 20px;
                border-radius: 8px;
                color: white;
                font-size: 14px;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;

            // 根据类型设置颜色
            switch (type) {
                case 'success':
                    toast.style.backgroundColor = 'var(--success-color)';
                    break;
                case 'error':
                    toast.style.backgroundColor = 'var(--danger-color)';
                    break;
                default:
                    toast.style.backgroundColor = 'var(--info-color)';
            }

            toast.textContent = message;
            document.body.appendChild(toast);

            // 3秒后自动移除
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
